<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Foursuit!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{box-sizing:border-box}
:root{
  --bg:#090907;
  --stripe:#11100b;
  --ink:#f2e6bc;
  --muted:#b7a77a;
  --line:#d8bd64;
  --panel:#18130c;
  --red:#c92828;
  --gold:#d6a93c;
  --green:#518f4b;
  --blue:#45a6d6;
  --dead:#862b2b;
}
body{
  margin:0;
  background:
    radial-gradient(circle at center 10%,rgba(216,189,100,.16),transparent 28%),
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.82)),
    repeating-linear-gradient(0deg,var(--bg) 0 4px,var(--stripe) 4px 8px);
  color:var(--ink);
  font-family:"Press Start 2P","Courier New",monospace;
  image-rendering:pixelated;
  overflow-x:hidden;
  font-size:11px;
}
body.retro-gray{
  --bg:#111;
  --stripe:#181818;
  --ink:#e0e0e0;
  --muted:#aaa;
  --line:#ccc;
  --panel:#222;
  --gold:#ddd;
  --green:#aaa;
  --blue:#ddd;
  --dead:#666;
}
body.retro-green{
  --bg:#001400;
  --stripe:#002200;
  --ink:#79ff79;
  --muted:#4fbf4f;
  --line:#79ff79;
  --panel:#001f00;
  --gold:#b8ffb8;
  --green:#79ff79;
  --blue:#b8ffb8;
  --dead:#245524;
}
body.retro-amber{
  --bg:#1a1000;
  --stripe:#241400;
  --ink:#ffbf45;
  --muted:#c48b2c;
  --line:#ffbf45;
  --panel:#241400;
  --gold:#ffd27a;
  --green:#ffcf70;
  --blue:#ffd27a;
  --dead:#7c3d00;
}
body.vivid{
  --bg:#0715ff;
  --stripe:#00106e;
  --ink:#fff200;
  --muted:#66ff66;
  --line:#ffea00;
  --panel:#1010cc;
  --gold:#ffea00;
  --red:#ff2020;
  --green:#00ff4c;
  --blue:#00d9ff;
  --dead:#ff3030;
}
body.dark{
  --bg:#050019;
  --stripe:#0b0630;
  --ink:#cbbcff;
  --muted:#8274b8;
  --line:#6f57d8;
  --panel:#0c0822;
  --gold:#b88cff;
  --green:#54b887;
  --blue:#7c6dff;
  --dead:#4d244d;
}
body.cozy{
  --bg:#2a170d;
  --stripe:#3a2113;
  --ink:#f8dfb4;
  --muted:#d19b79;
  --line:#e7b46a;
  --panel:#3b2415;
  --gold:#ffd37e;
  --green:#a9c98e;
  --blue:#98c5d6;
  --dead:#a75b50;
}
body.classic{
  --bg:#1b4f2a;
  --stripe:#174322;
  --ink:#ffffff;
  --muted:#d8d8d8;
  --line:#ffffff;
  --panel:#0f351a;
  --gold:#ffffff;
  --green:#ffffff;
  --blue:#ffffff;
  --dead:#777;
}

button,input{font-family:inherit}
.screen{display:none;min-height:100vh;padding:8px}
.screen.active{display:block}
.shell{position:relative;

  max-width:1280px;
  margin:0 auto;
  border:4px double var(--line);
  background:rgba(22,17,10,.97);
  box-shadow:0 0 0 4px #000,0 0 40px #000;
  padding:10px;
}
body.classic .shell{background:#105020}
h1{
  color:var(--line);
  font-size:40px;
  margin:8px 0 12px;
  letter-spacing:3px;
  text-shadow:4px 4px #000;
  text-transform:uppercase;
  line-height:1.2;
}
.title-bang{color:var(--red);margin-left:4px}
.title-bang.signal{animation:bangPulse .7s infinite alternate}
@keyframes bangPulse{
  from{color:var(--red);text-shadow:0 0 4px var(--red)}
  to{color:#fff;text-shadow:0 0 12px var(--red)}
}
.subtitle{color:var(--muted);margin-bottom:18px;line-height:1.6}
.btn{
  background:#2b2111;
  color:var(--ink);
  border:2px solid var(--line);
  padding:8px 12px;
  margin:4px;
  font-weight:bold;
  text-transform:uppercase;
  cursor:pointer;
  box-shadow:3px 3px #000;
  font-size:10px;
  min-height:36px;
  white-space:nowrap;
}
body.classic .btn{background:#ffffff;color:#111;border-color:#111}
#classicBtn{min-width:92px;}
#soundBtn{min-width:76px;}
#devScoreBtn{min-width:34px;padding-left:8px;padding-right:8px;}
#clearBtn{min-width:58px;padding-left:8px;padding-right:8px;}
.btn:hover{background:#423018}
.btn:disabled{opacity:.45;cursor:not-allowed}
.red{color:var(--red)}
.black{color:#050505;text-shadow:1px 1px var(--line)}
.gold{color:var(--gold)}
.green{color:var(--green)}
.blue{color:var(--blue)}

.menu-layout{
  display:grid;
  grid-template-columns:1fr .88fr;
  gap:18px;
  align-items:center;
  min-height:calc(100vh - 36px);
}
.menu-card-zone{
  min-height:540px;
  display:grid;
  grid-template-columns:repeat(2,210px);
  grid-template-rows:repeat(2,250px);
  justify-content:center;
  align-content:center;
  gap:14px;
}
.faction{
  background:#efe4c7;
  color:#111;
  border:5px solid #111;
  padding:22px 12px;
  cursor:pointer;
  position:relative;
  box-shadow:8px 8px #000,14px 14px rgba(0,0,0,.35);
  min-height:250px;
}
.faction.selected{
  outline:5px solid var(--gold);
  box-shadow:8px 8px #000,0 0 22px rgba(214,169,60,.55);
}
.card-corner-menu{position:absolute;font-size:28px;line-height:1}
.card-corner-menu.tl{top:9px;left:9px}
.card-corner-menu.br{bottom:9px;right:9px;transform:rotate(180deg)}
.faction-title{
  text-align:center;
  font-size:15px;
  line-height:1.5;
  text-transform:uppercase;
  margin-top:24px;
  margin-bottom:10px;
}
.faction p{font-size:9px;line-height:1.65;text-align:center;margin:0}
.faction-big-suit{
  text-align:center;
  font-size:58px;
  line-height:1;
  margin:8px 0 6px;
}
body.classic .faction-title,
body.classic .faction p{display:none}
body.classic .faction-big-suit{font-size:88px;margin-top:42px}

.check{
  position:absolute;
  top:9px;
  right:9px;
  width:24px;
  height:24px;
  border:3px solid #111;
  display:grid;
  place-items:center;
  background:#fff;
  color:#111;
  font-size:12px;
}
.menu-side{
  max-width:515px;
  width:100%;
  justify-self:start;
  border:4px double var(--line);
  background:linear-gradient(#241b10,#15100a);
  padding:18px;
  box-shadow:inset 0 0 0 2px #000,5px 5px #000;
}
body.classic .menu-side{background:#125a24}
.menu-controls{display:flex;flex-direction:column;gap:8px}
.modebox{
  border:2px solid var(--line);
  background:#080706;
  padding:11px;
  color:var(--ink);
  box-shadow:2px 2px #000;
  line-height:2;
}
body.classic .modebox{background:#0f451d}
.modebox-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.modebox-row.mode-choice-row{flex-wrap:nowrap;justify-content:center;gap:12px;}
.modebox-row.scale-row{max-width:430px;margin:0 auto;justify-content:center;row-gap:4px;column-gap:12px;}
.scale-break{flex-basis:100%;height:0;padding:0;margin:0;}
.modebox b{color:var(--gold)}
.menu-button-row{
  display:flex;
  gap:8px;
  flex-wrap:nowrap;
  justify-content:center;
  align-items:center;
}

.score-side{
  border:2px solid var(--line);
  background:#080706;
  color:var(--ink);
  box-shadow:2px 2px #000;
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px 10px;
  line-height:1.45;
}
body.classic .score-side{background:#0f451d}
.score-side{
  font-size:12px;
  width:150px;
  justify-self:center;
  margin:0 auto 8px;
}
.score-val{
  color:var(--gold);
  margin-left:8px;
}

.status,.button-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
.statbox{
  border:2px solid var(--line);
  background:#080706;
  padding:8px 10px;
  color:var(--ink);
  box-shadow:2px 2px #000;
  min-height:36px;
  display:flex;
  align-items:center;
  gap:4px;
}
body.classic .statbox{background:#0f451d}



.side-score-bottom{
  margin:8px auto 0;
  width:150px;
}

/* VISUAL TEST BRANCH: compact stat-box info bar */
.game-status{
  margin:0 auto 10px;
  padding:2px 4px;
  row-gap:6px;
}
.game-status .statbox{
  min-height:32px;
  padding:6px 9px;
  font-size:10px;
  white-space:nowrap;
}
#progressBox.hidden{
  display:none;
}

.story-wrap{min-height:560px;display:grid;place-items:center}
.story{
  max-width:830px;
  border:4px double var(--line);
  background:#15100a;
  padding:20px;
  box-shadow:inset 0 0 0 2px #000;
  text-align:center;
}
.story-art{
  height:150px;
  border:3px solid var(--line);
  background:#111;
  margin-bottom:14px;
  position:relative;
  overflow:hidden;
  box-shadow:inset 0 0 0 2px #000;
}
.art-hearts{
  background:
    linear-gradient(90deg,transparent 0 12%,#33230f 12% 16%,transparent 16% 28%,#33230f 28% 32%,transparent 32% 44%,#33230f 44% 48%,transparent 48%),
    linear-gradient(0deg,#2b2417 0 24%,#4e3a1a 24% 30%,#1b1710 30% 100%);
}
.art-hearts:before{content:"♜ ♜ ♜";position:absolute;bottom:28px;left:0;right:0;font-size:44px;color:var(--red);text-shadow:3px 3px #000}
.art-hearts:after{content:"⚔ ⚔ ⚔";position:absolute;bottom:2px;left:0;right:0;font-size:28px;color:var(--line)}
.art-diamonds{
  background:
    radial-gradient(circle at 20% 24%,#f4dc85 0 3px,transparent 4px),
    radial-gradient(circle at 42% 38%,#f4dc85 0 2px,transparent 3px),
    radial-gradient(circle at 70% 20%,#f4dc85 0 3px,transparent 4px),
    radial-gradient(circle at 82% 42%,#f4dc85 0 2px,transparent 3px),
    linear-gradient(0deg,#171027 0 32%,#251943 32% 100%);
}
.art-diamonds:before{content:"☾";position:absolute;top:6px;left:36px;font-size:58px;color:#f4dc85}
.art-diamonds:after{content:"♦";position:absolute;bottom:-18px;left:0;right:0;font-size:120px;color:var(--red);opacity:.7}
.art-clubs{
  background:
    linear-gradient(135deg,transparent 0 48%,#3d331f 48% 52%,transparent 52%),
    linear-gradient(45deg,transparent 0 45%,#4b4027 45% 55%,transparent 55%),
    linear-gradient(0deg,#211a10 0 36%,#342b1d 36% 62%,#17120b 62% 100%);
}
.art-clubs:before{content:"▲ ▲ ▲";position:absolute;bottom:30px;left:0;right:0;font-size:52px;color:#6a5630;text-shadow:3px 3px #000}
.art-clubs:after{content:"♣ ⚒ ♣";position:absolute;bottom:0;left:0;right:0;font-size:34px;color:#050505;text-shadow:1px 1px var(--line)}
.art-spades{
  background:
    radial-gradient(circle at 18% 68%,#2f4b28 0 14px,transparent 15px),
    radial-gradient(circle at 38% 55%,#355c2c 0 18px,transparent 19px),
    radial-gradient(circle at 64% 62%,#2f4b28 0 16px,transparent 17px),
    radial-gradient(circle at 84% 50%,#355c2c 0 20px,transparent 21px),
    linear-gradient(0deg,#15110b 0 28%,#1c2a19 28% 100%);
}
.art-spades:before{content:"♠";position:absolute;bottom:-20px;left:0;right:0;font-size:120px;color:#050505;text-shadow:1px 1px var(--line);opacity:.75}
.art-spades:after{content:"♞  ♞";position:absolute;bottom:12px;left:0;right:0;font-size:28px;color:var(--line)}
.story-symbols{font-size:38px;margin-bottom:8px}
.story h2{font-size:25px;color:var(--gold);margin:8px 0 14px;text-transform:uppercase;line-height:1.4}
.story p{white-space:pre-line;text-align:left;line-height:1.75;font-size:12px}


.story.classic-story{
  background:
    linear-gradient(180deg,rgba(255,255,255,.055),rgba(0,0,0,.18)),
    #0f351a;
}
.story.end-story{
  max-width:880px;
}
.story-score{
  display:none;
  border:3px double var(--line);
  background:rgba(0,0,0,.26);
  margin:14px auto 10px;
  padding:10px;
  max-width:620px;
  line-height:1.8;
  text-align:center;
  box-shadow:inset 0 0 0 2px #000;
}
.story-score.active{display:block}
.story-score .score-row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.story-score .score-chip{
  border:2px solid var(--line);
  padding:7px 9px;
  background:rgba(0,0,0,.28);
}
.story-score .score-note{
  color:var(--muted);
  margin-top:8px;
}
.story-para{display:inline-block;}
.story-tipline{
  color:var(--gold);
  text-align:center;
  line-height:1.8;
}
.story-art.classic-art{
  background:
    radial-gradient(circle at center,rgba(255,255,255,.12),transparent 36%),
    repeating-linear-gradient(45deg,#0f351a 0 12px,#174322 12px 24px);
}
.story-art.classic-art:before{
  content:"♥ ♦";
  position:absolute;
  left:0;right:0;top:24px;
  font-size:56px;
  color:var(--red);
  text-shadow:3px 3px #000;
}
.story-art.classic-art:after{
  content:"♣ ♠";
  position:absolute;
  left:0;right:0;bottom:22px;
  font-size:56px;
  color:#050505;
  text-shadow:1px 1px var(--line);
}
.story-art.end-win{
  background:
    radial-gradient(circle at 50% 40%,rgba(214,169,60,.32),transparent 42%),
    linear-gradient(180deg,#211806,#080706);
}
.story-art.end-win:before{
  content:"WIN";
  position:absolute;
  left:0;right:0;top:44px;
  font-size:42px;
  color:var(--gold);
  text-shadow:4px 4px #000;
}
.story-art.end-loss{
  background:
    radial-gradient(circle at 50% 40%,rgba(201,40,40,.22),transparent 42%),
    linear-gradient(180deg,#210909,#080706);
}
.story-art.end-loss:before{
  content:"LOSS";
  position:absolute;
  left:0;right:0;top:44px;
  font-size:42px;
  color:var(--red);
  text-shadow:4px 4px #000;
}

.battle-layout{
  display:grid;
  grid-template-columns:1fr 280px 1fr;
  gap:12px;
  margin-top:12px;
  align-items:start;
}
.panel{
  border:3px solid var(--line);
  background:linear-gradient(#241b10,#15100a);
  padding:10px;
  box-shadow:inset 0 0 0 2px #000;
}
body.classic .panel{background:#0f451d}
.panel h2{text-align:center;margin:4px 0 10px;color:var(--line);font-size:15px;line-height:1.4}
.grid{
  display:grid;
  grid-template-columns:repeat(3,82px);
  grid-template-rows:repeat(3,104px);
  gap:8px;
  justify-content:center;
}
.card{
  background:#efe4c7;
  color:#111;
  border:3px solid var(--line);
  box-shadow:3px 3px #000;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-weight:bold;
  user-select:none;
}
.card.place{cursor:pointer}
.card.back{color:var(--line)}
.card.back-hearts{
  background:
    linear-gradient(45deg,#2b2111 25%,transparent 25%),
    linear-gradient(-45deg,#2b2111 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#2b2111 75%),
    linear-gradient(-45deg,transparent 75%,#2b2111 75%);
  background-size:18px 18px;
  background-color:#4b3518;
}
.card.back-diamonds{
  background:
    repeating-linear-gradient(45deg,#221a10 0 5px,#3b2b16 5px 10px),
    repeating-linear-gradient(-45deg,#221a10 0 5px,#3b2b16 5px 10px);
}
.card.back-clubs{
  background:repeating-linear-gradient(0deg,#211a10 0 8px,#3a2b17 8px 16px);
}
.card.back-spades{
  background:repeating-linear-gradient(45deg,#211a10 0 8px,#3a2b17 8px 16px);
}
body.classic .card.back{background:repeating-linear-gradient(45deg,#b00000 0 8px,#ffffff 8px 16px);color:#111}
.card.dead{background:var(--dead);color:#111;opacity:.88}
.card.win{outline:4px solid var(--green)}
.card.tie{outline:4px solid var(--gold)}
.card.pick{outline:5px solid var(--blue);cursor:pointer}
.card.commit-target{outline:5px solid var(--red)}
.rank{font-size:34px}
.corner{position:absolute;font-size:18px}
.tl{top:5px;left:7px}
.br{bottom:5px;right:7px;transform:rotate(180deg)}

.panel-wrap{display:flex;flex-direction:column;align-items:center}
body.classic .card.win{outline:4px solid #38b764!important}
body.classic .card.tie{outline:4px solid #ffffff!important}
body.classic .card.dead{
  background:#c92828!important;
  color:#ffffff!important;
  opacity:.94!important;
}
body.classic .card.dead .corner,
body.classic .card.dead .rank{color:#ffffff!important}

.royals{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(4,82px);
  gap:8px;
  justify-content:center;
}
.royal{
  width:82px;
  height:104px;
  background:#efe4c7;
  color:#111;
  border:3px solid var(--line);
  box-shadow:3px 3px #000;
  font-weight:bold;
  cursor:pointer;
  position:relative;
}
.royal .royal-rank{font-size:32px;display:block;margin-top:32px}
.royal .royal-suit-a{position:absolute;top:5px;left:7px;font-size:18px}
.royal .royal-suit-b{position:absolute;bottom:5px;right:7px;font-size:18px;transform:rotate(180deg)}
.royal.used{background:#555;color:#222;opacity:.6}
.royal.bloodline{outline:4px solid var(--red)}
.royal.committed{outline:4px solid var(--red);box-shadow:3px 3px #000,0 0 16px rgba(201,40,40,.75)}
.center-column{display:flex;flex-direction:column;gap:10px}
.log-title{text-align:center;margin:0;color:var(--line);font-size:15px}
.log{
  height:410px;
  overflow:auto;
  border:2px solid var(--line);
  background:#050505;
  color:var(--muted);
  padding:10px;
  text-align:center;
  font-size:10px;
  line-height:1.75;
  font-weight:bold;
}

/* Final polish: quiet scrollbars until interaction */
.log,.modal-card{
  scrollbar-width:none;
}
.log:hover,.log:focus,.log:focus-within,
.modal-card:hover,.modal-card:focus,.modal-card:focus-within{
  scrollbar-width:thin;
}
.log::-webkit-scrollbar,.modal-card::-webkit-scrollbar{
  width:0;
  height:0;
}
.log:hover::-webkit-scrollbar,.log:focus::-webkit-scrollbar,.log:focus-within::-webkit-scrollbar,
.modal-card:hover::-webkit-scrollbar,.modal-card:focus::-webkit-scrollbar,.modal-card:focus-within::-webkit-scrollbar{
  width:8px;
  height:8px;
}
.log::-webkit-scrollbar-thumb,.modal-card::-webkit-scrollbar-thumb{
  background:var(--line);
}
.announcement-card{
  max-width:720px;
}
.announcement-card p{
  text-align:center;
}

.report-line{margin-bottom:8px}
.report-title{color:var(--gold)}
.report-win{color:#83d37b}
.report-loss{color:#ff7676}
.report-tie{color:#f2cf5b}
.report-info{color:#72cfff}
.report-rule{color:#f2e6bc}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  z-index:10;
  place-items:center;
  padding:18px;
}
.modal.active{display:grid}
.modal-card{
  max-width:860px;
  max-height:88vh;
  overflow:auto;
  border:4px double var(--line);
  background:#19130c;
  padding:20px;
  box-shadow:0 0 0 4px #000;
  line-height:1.8;
  font-size:10px;
}
body.classic .modal-card{background:#0f451d}
.modal-card h2,.modal-card h3{color:var(--gold);text-transform:uppercase}
.modal-card li{margin-bottom:10px}
.confirm-actions{text-align:center;margin-top:14px}
.options-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

.modal-card{
  background:
    linear-gradient(180deg,rgba(255,255,255,.035),rgba(0,0,0,.18)),
    #19130c;
}
.modal-card h2{
  text-align:center;
  font-size:22px;
  letter-spacing:2px;
  border-bottom:3px double var(--line);
  padding-bottom:10px;
  margin-top:0;
}
.modal-card h3{
  border-left:8px solid var(--line);
  padding-left:10px;
  margin-top:18px;
  margin-bottom:8px;
}
.modal-card p{
  color:var(--ink);
  line-height:1.85;
}
.modal-card .modal-subtitle{
  text-align:center;

<script>

const devMode = false;
const titleMode = 2; // 1=Foursuit! both modes, 2=Classic Foursuit!/Fantasy Loresuit!, 3=Loresuit! both modes
const startMode = 1; // 1=starts in Classic, 2=starts in Fantasy
const verFlag = true; // true=show version badge, false=hide version badge
const announcementEnabled = true;
const announcementId = "beta-0-1-launch";
const announcementTitle = "Welcome to Foursuit!";
const announcementBody = `
  <p>Welcome to the Foursuit! beta test.</p>
  <p>Please send your feedback to:<br><a href="https://x.com/566335006" target="_blank" rel="noopener">x.com/577345663xyz</a></p>
`;
let soundOn = true;
let audioCtx = null;
let audioMaster = null;

const SFX = {
  menuSelect:"FUZZ-06 V28:L180:G105:F35",
  modalOpen:"POPP-08 V28:L180:G105:F35",
  modalClose:"POPP-06 V28:L180:G105:F35",
  optionChange:"WAVE-01 V28:L180:G105:F35",
  fantasy:"BLIP-02 V28:L180:G105:F35",
  classic:"BLIP-01 V28:L180:G105:F35",
  ready:"TICK-01 V28:L180:G105:F35",
  begin:"BLIP-10 V28:L180:G105:F35",
  error:"CHIR-01 V28:L180:G105:F35",
  mercy:"PING-01 V28:L180:G105:F35",
  card:"FUZZ-06 V28:L180:G105:F35",
  lock:"TICK-01 V28:L180:G105:F35",
  next:"FUZZ-08 V28:L180:G105:F35",
  show:"UPHI-09 V28:L180:G105:F35",
  win:"PING-04 V28:L180:G105:F35",
  loss:"DNLO-04 V28:L180:G105:F35",
  soundToggle:"TICK-01 V28:L180:G105:F35"
};

function ensureAudio(){
 if(!audioCtx){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioMaster = audioCtx.createGain();
  audioMaster.gain.value = 0.28;
  audioMaster.connect(audioCtx.destination);
 }
 if(audioCtx.state==="suspended")audioCtx.resume();
}

function parseSfx(code){
 const parts=code.split(" ");
 const [cat,numText]=parts[0].split("-");
 const vals={cat,num:Number(numText),V:28,L:180,G:105,F:35};
 if(parts[1]){
  parts[1].split(":").forEach(p=>{
   vals[p[0]]=Number(p.slice(1));
  });
 }
 return vals;
}

function sfxGain(t,dur,peak=0.7){
 const g=audioCtx.createGain();
 g.gain.setValueAtTime(0.0001,t);
 g.gain.exponentialRampToValueAtTime(Math.max(0.0001,peak),t+Math.min(0.025,dur*.2));
 g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
 g.connect(audioMaster);
 return g;
}

function sfxOsc(type,freq,t,dur,g,drift=0){
 const o=audioCtx.createOscillator();
 o.type=type;
 o.frequency.setValueAtTime(Math.max(20,freq),t);
 if(drift)o.frequency.exponentialRampToValueAtTime(Math.max(20,freq+drift),t+dur);
 o.connect(g);
 o.start(t);
 o.stop(t+dur+.03);
}

function sfxNoise(t,dur,g,freq=700,type="bandpass",q=2){
 const size=Math.max(1,Math.floor(audioCtx.sampleRate*(dur+.05)));
 const buf=audioCtx.createBuffer(1,size,audioCtx.sampleRate);
 const data=buf.getChannelData(0);
 for(let i=0;i<size;i++)data[i]=Math.random()*2-1;
 const src=audioCtx.createBufferSource();
 const f=audioCtx.createBiquadFilter();
 f.type=type;
 f.frequency.setValueAtTime(freq,t);
 f.Q.value=q;
 src.buffer=buf;
 src.connect(f);
 f.connect(g);
 src.start(t);
 src.stop(t+dur);
}

function playSfx(name,force=false){
 if(!force && !soundOn)return;
 const code=SFX[name];
 if(!code)return;
 ensureAudio();
 const s=parseSfx(code);
 const t=audioCtx.currentTime+.01;
 const dur=Math.max(0.03,s.L/1000);
 const step=s.num-1;
 const fx=s.F/100;
 audioMaster.gain.setTargetAtTime(Math.max(0,Math.min(1,s.V/100)),audioCtx.currentTime,0.01);

 if(s.cat==="FUZZ"){
  const g=sfxGain(t,dur*.75,.65);
  sfxNoise(t,dur*.75,g,220+step*120,"bandpass",1+fx*9);
 }else if(s.cat==="POPP"){
  const g=sfxGain(t,dur*.35,.65);
  sfxOsc("sine",110+step*16,t,dur*.35,g,160+step*12);
 }else if(s.cat==="WAVE"){
  const g=sfxGain(t,dur*.75,.45);
  sfxOsc("sine",220+step*36,t,dur*.75,g,10+fx*35);
 }else if(s.cat==="BLIP"){
  const g=sfxGain(t,Math.max(.045,dur*.42),.55);
  sfxOsc("square",500+step*90,t,Math.max(.045,dur*.42),g);
 }else if(s.cat==="TICK"){
  const g=sfxGain(t,Math.max(.025,dur*.18),.45);
  sfxNoise(t,Math.max(.025,dur*.18),g,700+step*180,"highpass",3);
 }else if(s.cat==="CHIR"){
  const d=dur*.25;
  const g=sfxGain(t,d,.5);
  sfxOsc("square",820+step*100,t,d,g,220+step*28);
  const g2=sfxGain(t+d*1.15,d,.4);
  sfxOsc("square",900+step*110,t+d*1.15,d,g2,180+step*20);
 }else if(s.cat==="PING"){
  const g=sfxGain(t,dur*.9,.42);
  const g2=sfxGain(t,dur*.55,.22);
  sfxOsc("sine",720+step*95,t,dur*.9,g);
  sfxOsc("sine",1440+step*190,t,dur*.55,g2);
 }else if(s.cat==="BEAT"){
  const g=sfxGain(t,dur*.55,.55);
  sfxNoise(t,dur*.55,g,3600+step*240,"highpass",.8+fx*2);
  const g2=sfxGain(t,dur*.12,.35);
  sfxOsc("square",190+step*35,t,dur*.12,g2);
 }else if(s.cat==="UPHI"){
  const g=sfxGain(t,dur*.8,.48);
  sfxOsc("triangle",520+step*105,t,dur*.8,g,420+step*60);
 }else if(s.cat==="DNLO"){
  const g=sfxGain(t,dur*.8,.55);
  sfxOsc("sine",75+step*22+330,t,dur*.8,g,-(250+step*24));
 }else{
  const g=sfxGain(t,dur*.5,.45);
  sfxOsc("sine",440+step*40,t,dur*.5,g);
 }
}

function toggleSound(){
 const wasOn=soundOn;
 if(wasOn)playSfx("soundToggle",true);
 soundOn=!soundOn;
 $("soundBtn").textContent=soundOn?"SOUND":"QUIET";
 if(soundOn)playSfx("soundToggle",true);
}

let currentOption = "classic";

const splashClassic = "Four suits. Two colors. One deck.";
const splashFantasy = "Four factions. Two sides. One crown.";

const factions={
 hearts:{
  key:"hearts",suit:"♥",color:"red",name:"Lifeblood Order",classic:"Hearts",rival:"clubs",art:"art-hearts",
  lore:"Ordered armies of road, crown, law, and red-bannered expansion."
 },
 diamonds:{
  key:"diamonds",suit:"♦",color:"red",name:"Starshine Druids",classic:"Diamonds",rival:"spades",art:"art-diamonds",
  lore:"Moonlit mages of tower, omen, star-chart, and celestial power."

function setupAlliesGame(){
 alliesMode=true;
 campaignQueue=[];
 const allyKey=Object.keys(factions).find(k=>k!==chosen&&factions[k].color===playerF.color);
 const enemyKeys=Object.keys(factions).filter(k=>factions[k].color!==playerF.color);
 alliesPlayerFactions=[playerF,factions[allyKey]];
 alliesCpuFactions=[factions[playerF.rival],factions[enemyKeys.find(k=>k!==playerF.rival)]];
 alliesPGrids=[Array(9).fill(null),Array(9).fill(null)];
 alliesCGrids=[shuffle([...ranks]),shuffle([...ranks])];
 alliesStates=[
  Array.from({length:9},()=>({p:"",c:"",tie:false})),
  Array.from({length:9},()=>({p:"",c:"",tie:false}))
 ];
 alliesResults=[null,null];
 alliesPhase="deployA";
 alliesIndex=0;
 pGrid=alliesPGrids[0];
 cGrid=alliesCGrids[0];
 states=alliesStates[0];
 playerF=alliesPlayerFactions[0];
 cpuF=alliesCpuFactions[0];
 revealed=false;finalized=false;pending=null;acePick=[];pCommit=null;cCommit=null;pendingEnd=false;
 show("battle");
 report(`<span class="report-title">Deploy first ${colorLabel()} ${armyWord()}.</span><br><span class="report-info">Place cards 2-10, then press Next.</span>`,false);
 render();
}

function switchAlliesActive(index,phase){
 alliesIndex=index;
 alliesPhase=phase;
 playerF=alliesPlayerFactions[index];
 cpuF=alliesCpuFactions[index];
 pGrid=alliesPGrids[index];
 cGrid=alliesCGrids[index];
 states=alliesStates[index];
 revealed=false;
 finalized=false;
 pending=null;
 acePick=[];
}

function nextAllies(){
 if(alliesPhase==="deployA"){
  if(alliesPGrids[0].some(v=>v===null))return;
  switchAlliesActive(1,"deployB");
  report(`<span class="report-title">Deploy second ${colorLabel()} ${armyWord()}.</span><br><span class="report-info">Place the second set, then press Next.</span>`,false);
  render();
  return;
 }

 if(alliesPhase==="deployB"){
  if(alliesPGrids[1].some(v=>v===null))return;
  switchAlliesActive(0,"battleA");
  report(`<span class="report-title">Deployment Complete.</span><br><span class="report-info">Resolve first ${colorLabel()} ${armyWord()}. Press Show.</span>`,false);
  render();
  return;
 }

 if(alliesPhase==="battleA" && finalized){
  switchAlliesActive(1,"battleB");
  report(`<span class="report-title">First ${colorLabel()} ${armyWord()} resolved.</span><br><span class="report-info">Resolve second ${colorLabel()} ${armyWord()}. Press Show.</span>`,false);
  render();
  return;
 }

 if(alliesPhase==="roundDone" && finalized){
  round++;
  setupAlliesGame();
 }
}

function finalizeAlliesBattle(){
 resolveRoyalParlay();
 const t=totals();
 alliesResults[alliesIndex]={p:t.p,c:t.c};
 let msg=`<span class="report-title">${colorLabel()} ${armyWord()} ${alliesIndex+1} locked:</span><br>${fname(playerF)} ${t.p}<br>${fname(cpuF)} ${t.c}`;
 report(msg);
 finalized=true;

 if(alliesIndex===0){
  report(`<span class="report-info">Press Next to resolve ${colorLabel()} ${armyWord()} II.</span>`);
  render();
  return;
 }

 const totalP=(alliesResults[0]?.p||0)+(alliesResults[1]?.p||0);
 const totalC=(alliesResults[0]?.c||0)+(alliesResults[1]?.c||0);
 const diff=Math.abs(totalP-totalC);
 let finalMsg=`<span class="report-title">Both ${armyWord()} phases resolved.</span><br>Player Total ${totalP}<br>${opponentWord()} Total ${totalC}<br>`;
 if(totalP>totalC){
  pScore+=diff;
  finalMsg+=`<span class="report-win">Player gains ${diff}.</span>`;
 }else if(totalC>totalP){
  cScore+=diff;
  finalMsg+=`<span class="report-loss">${opponentWord()} gains ${diff}.</span>`;
 }else{
  finalMsg+=`<span class="report-tie">Deadlock. No score.</span>`;
 }
 report(finalMsg);
 alliesPhase="roundDone";
 render();
 if(pScore>=goal||cScore>=goal){
  pendingEnd=true;
  report(`<span class="report-info">Goal reached. Review the Outcome Report, then press Wrap.</span>`);
  render();
 }else report(`<span class="report-info">Round complete. Press Next.</span>`);
}

function setupBattle(){
 pGrid=Array(9).fill(null);
 cGrid=shuffle([...ranks]);
 states=Array.from({length:9},()=>({p:"",c:"",tie:false}));
 revealed=false;finalized=false;pending=null;acePick=[];pCommit=null;cCommit=null;pendingEnd=false;

 
 report(`<span class="report-title">Deploy cards 2-10.</span><br><span class="report-info">Click your field squares to cycle unused cards.</span>`,false);
 render();
}

function render(){
 $("pScore").textContent=pScore;
 $("cScore").textContent=cScore;
 $("modeText").textContent=modeDisplay();
 const prog=progressLabel();
 $("progressText").textContent=prog||"-";
 $("progressBox").classList.toggle("hidden",!prog);
 $("difficultyText").textContent=difficulty==="hard"?"Hard":difficulty==="medium"?"Medium":"Easy";
 $("scaleText").textContent=scaleName();
 $("roundNum").textContent=round;
 $("pName").innerHTML=`<span class="${playerF.color}">${playerF.suit}</span> ${fname(playerF)} <span class="${playerF.color}">${playerF.suit}</span>`;
 $("cName").innerHTML=`<span class="${cpuF.color}">${cpuF.suit}</span> ${fname(cpuF)} <span class="${cpuF.color}">${cpuF.suit}</span>`;

 renderGrid("pGrid",pGrid,playerF,false);
 renderGrid("cGrid",cGrid,cpuF,!revealed);
 renderRoyals();

 $("retreatBtn").textContent=currentOption==="classic"?"QUIT":"Mercy";
 $("devScoreBtn").style.display=devMode?"inline-block":"none";
 $("clearBtn").disabled=revealed||finalized||pendingEnd||pGrid.every(v=>v===null);
 $("nextBtn").textContent=pendingEnd?"Wrap":"Next";
 $("nextBtn").classList.remove("wrap-win","wrap-loss");
 if(pendingEnd)$("nextBtn").classList.add(pScore>=goal?"wrap-win":"wrap-loss");

 if(alliesMode){
  const deployPhase=alliesPhase==="deployA"||alliesPhase==="deployB";
  $("revealBtn").disabled=deployPhase||revealed||pGrid.some(v=>v===null)||pendingEnd;
  $("finalBtn").disabled=deployPhase||!revealed||finalized||pending||pendingEnd;
  if(pendingEnd)$("nextBtn").disabled=false;
  else if(deployPhase)$("nextBtn").disabled=pGrid.some(v=>v===null);
  else if(alliesPhase==="battleA")$("nextBtn").disabled=!finalized;
  else if(alliesPhase==="battleB")$("nextBtn").disabled=true;
  else if(alliesPhase==="roundDone")$("nextBtn").disabled=false;
 }else{
  $("revealBtn").disabled=revealed||pGrid.some(v=>v===null)||pendingEnd;
  $("finalBtn").disabled=!revealed||finalized||pending||pendingEnd;
  $("nextBtn").disabled=pendingEnd?false:!finalized;
 }
}


function isCommitTarget(id,i){
 if(!pCommit)return false;
 if(pCommit.r==="J")return pCommit.target===i;
 if(pCommit.r==="Q")return id==="pGrid"&&pCommit.target===i;
 if(pCommit.r==="K")return id==="cGrid"&&pCommit.target===i;
 if(pCommit.r==="A")return id==="cGrid"&&pCommit.targets&&pCommit.targets.includes(i);
 return false;
}

function royalValue(r){
 return {J:1,Q:2,K:3,A:4}[r]||0;
}

function royalName(r){
 return {J:"Jack",Q:"Queen",K:"King",A:"Ace"}[r]||"No Royal";
}

function playerCommitMessage(r){
 return currentOption==="classic"
  ? `${royalName(r)} selected. Choose Lock to resolve the Royal Parlay.`
  : `The ${royalName(r)} has joined the battle. Choose Lock to resolve the Royal Parlay.`;
}

function progressLabel(){
 if(mode!=="campaign")return "";
 if(currentOption==="classic")return `${battleIndex} of 3`;
 return `Act ${["I","II","III"][battleIndex-1]||battleIndex}`;
}

function modeDisplay(){
 if(currentOption==="classic"){
  if(mode==="campaign")return "Trifecta";
  if(mode==="allies")return "Colors";
  return "Single";
 }
 if(mode==="campaign")return "Campaign";
 if(mode==="allies")return "Allies";
 return "Battle";
}


function renderGrid(id,grid,f,hidden){
 const wrap=$(id);
 wrap.innerHTML="";
 grid.forEach((r,i)=>{
  const d=document.createElement("div");
  const st=id==="pGrid"?states[i].p:states[i].c;
  d.className="card "+(hidden?`back back-${f.key} `:st+" ");
  if(id==="pGrid"&&!revealed)d.classList.add("place");
  if(isPickable(id,i))d.classList.add("pick");
  if(isCommitTarget(id,i))d.classList.add("commit-target");
  d.onclick=()=>cardClick(id,i);

  if(hidden)d.textContent="?";
  else if(r)d.innerHTML=`<div class="corner tl ${f.color}">${f.suit}</div><div class="rank">${r}</div><div class="corner br ${f.color}">${f.suit}</div>`;
  else d.textContent="-";

  wrap.appendChild(d);
 });
}

function cardClick(id,i){
 if(id==="pGrid"&&!revealed){playSfx("card");cycleCard(i);return}
 if(!pending)return;
 playSfx("card");

 if(pending==="J"){
  if(!states[i].tie)return;
  pCommit={r:"J",target:i};
  pending=null;
  report(`<span class="report-info">${playerCommitMessage("J")}</span>`);
  render();
  return;
 }

 if(pending==="Q"){
  if(id!=="pGrid"||states[i].p!=="dead")return;
  pCommit={r:"Q",target:i};
  pending=null;
  report(`<span class="report-info">${playerCommitMessage("Q")}</span>`);
  render();
  return;
 }

 if(pending==="A"){
  if(id!=="cGrid")return;
  if(acePick.includes(i))return;
  if(acePick.length===1 && !isOrthogonalNeighbor(acePick[0],i)){
   playSfx("error");
   report(`<span class="report-loss">Ace can only choose adjacent enemy cards.</span>`);
   return;
  }
  acePick.push(i);
  pCommit={r:"A",targets:[...acePick]};
  if(acePick.length<2){
   report(`<span class="report-info">Ace: choose one adjacent enemy card.</span>`);
   render();
   return;
  }
  pending=null;
  report(`<span class="report-info">${playerCommitMessage("A")}</span>`);
  render();
  return;
 }
}

function isOrthogonalNeighbor(a,b){
 const ar=Math.floor(a/3), ac=a%3;
 const br=Math.floor(b/3), bc=b%3;
 return Math.abs(ar-br)+Math.abs(ac-bc)===1;
}

function isPickable(id,i){
 if(!pending)return false;
 if(pending==="J")return states[i].tie;
 if(pending==="Q")return id==="pGrid"&&states[i].p==="dead";
 if(pending==="A")return id==="cGrid";
 return false;
}

function cycleCard(i){
 const used=new Set(pGrid.filter((v,idx)=>v!==null&&idx!==i));
 const avail=ranks.filter(r=>!used.has(r));
 const idx=avail.indexOf(pGrid[i]);
 pGrid[i]=avail[(idx+1)%avail.length];
 render();
}

function revealBattle(){
 playSfx("show");
 revealed=true;
 resolveStates();

 let feed=[];

   else feed.push(`<span class="report-tie">Square ${i+1}: ${p} ties ${c}.</span>`);
  }else{
   if(p>c)feed.push(`<span class="report-win">Square ${i+1}: ${p}${playerF.suit} defeats ${c}${cpuF.suit}.</span>`);
   else if(c>p)feed.push(`<span class="report-loss">Square ${i+1}: ${c}${cpuF.suit} defeats ${p}${playerF.suit}.</span>`);
   else feed.push(`<span class="report-tie">Square ${i+1}: ${p}${playerF.suit} clashes evenly with ${c}${cpuF.suit}.</span>`);
  }
 }

 report(feed.join("<br>"),false);
 report(`<span class="report-title">Royal Parlay.</span><br><span class="report-info">Select one royal or Lock with no royal. Matching royals draw; higher royal wins.</span>`);

function resolveStates(){
 states=Array.from({length:9},(_,i)=>{
  const p=pGrid[i],c=cGrid[i];
  if(p>c)return{p:"win",c:"dead",tie:false};
  if(c>p)return{p:"dead",c:"win",tie:false};
  return{p:"tie",c:"tie",tie:true};
 });
}


function heirName(){
 return currentOption==="classic" ? "Heir" : "Bloodline";
}

function lockedRoyalMessage(){
 return currentOption==="classic" ? "The Heir must remain." : "The Bloodline must remain.";
}

function unusedRoyalCount(pool){
 return royalRanks.filter(r=>!pool[r]).length;
}

function simulatedTotalsAfter(side,commit){
 const pp=[...pGrid], cc=[...cGrid];
 let simStates=states.map(s=>({...s}));
 const isPlayer=side==="p";

 if(!commit)return totals();

 if(commit.r==="J"){
  const idx=commit.target;
  if(idx==null||!simStates[idx]||!simStates[idx].tie)return totals();
  simStates[idx]=isPlayer?{p:"win",c:"dead",tie:false}:{p:"dead",c:"win",tie:false};
 }

 if(commit.r==="Q"){
  const idx=commit.target;
  if(idx==null||!simStates[idx])return totals();
  if(isPlayer){
   if(simStates[idx].p!=="dead")return totals();
   simStates[idx].p="win";simStates[idx].c="dead";simStates[idx].tie=false;
  }else{
   if(simStates[idx].c!=="dead")return totals();
   simStates[idx].c="win";simStates[idx].p="dead";simStates[idx].tie=false;
  }
 }

 if(commit.r==="K"){
  const idx=commit.target;
  if(idx==null||!simStates[idx])return totals();
  if(isPlayer){
   if(simStates[idx].c!=="win")return totals();
   simStates[idx].c="dead";
  }else{
   if(simStates[idx].p!=="win")return totals();
   simStates[idx].p="dead";
  }
 }

 if(commit.r==="A"){
  const targets=commit.targets||[];
  if(targets.length!==2||!isOrthogonalNeighbor(targets[0],targets[1]))return totals();
  const [a,b]=targets;
  if(isPlayer)[cc[a],cc[b]]=[cc[b],cc[a]];
  else [pp[a],pp[b]]=[pp[b],pp[a]];
  simStates=Array.from({length:9},(_,i)=>{
   if(pp[i]>cc[i])return{p:"win",c:"dead",tie:false};
   if(cc[i]>pp[i])return{p:"dead",c:"win",tie:false};
   return{p:"tie",c:"tie",tie:true};
  });
 }

 let p=0,c=0;
 for(let i=0;i<9;i++){
  if(simStates[i].p==="win")p+=pp[i];
  if(simStates[i].c==="win")c+=cc[i];
 }
 return{p,c};
}

function computerGain(commit){
 const before=totals();
 const after=simulatedTotalsAfter("c",commit);
 return (after.c-after.p)-(before.c-before.p);
}

function chooseComputerCommit(){
 if(unusedRoyalCount(cRoyals)<=1)return null;

 const overlook = difficulty==="hard" ? 0.05 : difficulty==="medium" ? 0.10 : 0.15;
 if(Math.random()<overlook)return null;

 const minGain = difficulty==="hard"
  ? {J:3,Q:4,K:5,A:8}
  : difficulty==="medium"
  ? {J:4,Q:5,K:5,A:8}
  : {J:4,Q:5,K:6,A:9};

 const options=[];

 if(states.some(s=>s.tie) && !cRoyals.J){
  const tied=[];
  states.forEach((s,i)=>{if(s.tie)tied.push(i)});
  tied.forEach(idx=>{
   const commit={r:"J",target:idx};
   const gain=computerGain(commit);
   if(gain>=minGain.J)options.push({...commit,gain});
  });
 }

 if(states.some(s=>s.c==="dead") && !cRoyals.Q){
  for(let i=0;i<9;i++){
   if(states[i].c==="dead"){
    const commit={r:"Q",target:i};
    const gain=computerGain(commit);
    if(gain>=minGain.Q)options.push({...commit,gain});
   }
  }
 }

 if(states.some(s=>s.p==="win") && !cRoyals.K){
  for(let i=0;i<9;i++){
   if(states[i].p==="win"){
    const commit={r:"K",target:i};
    const gain=computerGain(commit);
    if(gain>=minGain.K)options.push({...commit,gain});
   }
  }
 }

 if(!cRoyals.A){
  const pairs=[[0,1],[1,2],[3,4],[4,5],[6,7],[7,8],[0,3],[3,6],[1,4],[4,7],[2,5],[5,8]];
  pairs.forEach(pair=>{
   const commit={r:"A",targets:pair};
   const gain=computerGain(commit);
   if(gain>=minGain.A)options.push({...commit,gain});
  });
 }

 if(!options.length)return null;
 options.sort((a,b)=>b.gain-a.gain || royalValue(b.r)-royalValue(a.r));
 return options[0];
}

function applyRoyalCommit(side,commit){
 if(!commit)return false;
 const isPlayer=side==="p";
 const pool=isPlayer?pRoyals:cRoyals;
 const label=isPlayer?"Player":opponentWord();

 if(commit.r==="J"){
  const idx=commit.target;
  if(idx==null||!states[idx]||!states[idx].tie)return false;
  states[idx]=isPlayer?{p:"win",c:"dead",tie:false}:{p:"dead",c:"win",tie:false};
  pool.J=true;
  report(`<span class="${isPlayer?"report-win":"report-loss"}">${label} Jack claims tied square ${idx+1}.</span>`);
  return true;
 }

 if(commit.r==="Q"){
  const idx=commit.target;
  if(idx==null||!states[idx])return false;
  if(isPlayer){
   if(states[idx].p!=="dead")return false;
   states[idx].p="win";
   states[idx].c="dead";
   states[idx].tie=false;
  }else{
   if(states[idx].c!=="dead")return false;
   states[idx].c="win";
   states[idx].p="dead";
   states[idx].tie=false;
  }
  pool.Q=true;
  report(`<span class="${isPlayer?"report-win":"report-loss"}">${label} Queen restores square ${idx+1}.</span>`);
  return true;
 }

 if(commit.r==="K"){
  const idx=commit.target;
  if(idx==null||!states[idx])return false;
  if(isPlayer){
   if(states[idx].c!=="win")return false;
   states[idx].c="dead";
  }else{
   if(states[idx].p!=="win")return false;
   states[idx].p="dead";
  }
  pool.K=true;
  report(`<span class="${isPlayer?"report-win":"report-loss"}">${label} King cancels square ${idx+1}.</span>`);
  return true;
 }

 if(commit.r==="A"){
  const targets=commit.targets||[];
  if(targets.length!==2)return false;
  const [a,b]=targets;
  if(!isOrthogonalNeighbor(a,b))return false;
  if(isPlayer){
   [cGrid[a],cGrid[b]]=[cGrid[b],cGrid[a]];
  }else{
   [pGrid[a],pGrid[b]]=[pGrid[b],pGrid[a]];
  }
  resolveStates();
  pool.A=true;
  report(`<span class="${isPlayer?"report-win":"report-loss"}">${label} Ace swaps adjacent squares ${a+1} and ${b+1}.</span>`);
  return true;
 }

 return false;
}

function resolveRoyalParlay(){
 cCommit=chooseComputerCommit();
 const pName=pCommit?royalName(pCommit.r):"No Royal";
 const cName=cCommit?royalName(cCommit.r):"No Royal";

 if(!pCommit&&!cCommit){
  report(`<span class="report-info">Royal Parlay: no royals committed.</span>`);
  return;
 }

 report(`<span class="report-title">Royal Parlay: ${pName} vs ${cName}.</span>`);

 if(pCommit&&cCommit&&pCommit.r===cCommit.r){
  report(`<span class="report-tie">Draw. Both royals remain.</span>`);
  pCommit=null;cCommit=null;pending=null;acePick=[];
  return;
 }

 let winner=null;
 if(pCommit&&!cCommit)winner="p";
 else if(!pCommit&&cCommit)winner="c";
 else winner=royalValue(pCommit.r)>royalValue(cCommit.r)?"p":"c";

 const winningCommit=winner==="p"?pCommit:cCommit;
 const losingCommit=winner==="p"?cCommit:pCommit;
 report(`<span class="${winner==="p"?"report-win":"report-loss"}">${winner==="p"?"Player":"Computer"} ${royalName(winningCommit.r)} beats ${losingCommit?royalName(losingCommit.r):"no royal"}.</span>`);

 const resolved=applyRoyalCommit(winner,winningCommit);
 if(!resolved){
  report(`<span class="report-info">${royalName(winningCommit.r)} finds no valid target and remains unused.</span>`);
 }
 pCommit=null;cCommit=null;pending=null;acePick=[];
}

function useRoyal(r){
 playSfx("card");
 if(pending){
  pending=null;
  acePick=[];
 }
 if(pCommit&&pCommit.r===r){
  pCommit=null;
  report(`<span class="report-info">${royalName(r)} cleared. Choose another royal or Lock with no royal.</span>`);
  render();
  return;
 }
 if(unusedRoyalCount(pRoyals)<=1 && !pRoyals[r]){
  playSfx("error");
  report(`<span class="report-loss">${lockedRoyalMessage()}</span>`);
  return;
 }

 if(r==="J"){
  if(!states.some(s=>s.tie)){
   playSfx("error");
   report(`<span class="report-loss">Jack needs a tied field. No ties are present.</span>`);
   return;
  }
  pCommit={r:"J",target:null};
  pending="J";
  report(`<span class="report-info">Jack selected. Choose one tied square for the Royal Parlay.</span>`);
 }

 if(r==="Q"){
  if(!states.some(s=>s.p==="dead")){
   playSfx("error");
   report(`<span class="report-loss">Queen needs one fallen player card. None are available.</span>`);
   return;
  }
  pCommit={r:"Q",target:null};
  pending="Q";
  report(`<span class="report-info">Queen selected. Choose one fallen card for the Royal Parlay.</span>`);
 }

 if(r==="K"){
  let best=-1,bestVal=-1;
  for(let i=0;i<9;i++){
   if(states[i].c==="win"&&cGrid[i]>bestVal){best=i;bestVal=cGrid[i]}
  }
  if(best<0){
   playSfx("error");
   report(`<span class="report-loss">King needs an enemy surviving card to cancel. None are available.</span>`);
   return;
  }
  pCommit={r:"K",target:best};
  pending=null;
  report(`<span class="report-info">${playerCommitMessage("K")}</span>`);
 }

 if(r==="A"){
  pCommit={r:"A",targets:[]};
  pending="A";
  acePick=[];
  report(`<span class="report-info">Ace selected. Choose two adjacent enemy cards for the Royal Parlay.</span>`);
 }

 render();
}

function totals(){
 let p=0,c=0;
 for(let i=0;i<9;i++){
  if(states[i].p==="win")p+=pGrid[i];
  if(states[i].c==="win")c+=cGrid[i];
 }
 return{p,c};
}

function finalizeRound(){
 playSfx("lock");
 if(alliesMode){
  finalizeAlliesBattle();
  return;
 }
 resolveRoyalParlay();
 const t=totals();
 const diff=Math.abs(t.p-t.c);
 let msg=`<span class="report-title">Final totals:</span><br>${fname(playerF)} ${t.p}<br>${fname(cpuF)} ${t.c}<br>`;

 if(t.p>t.c){
  pScore+=diff;
  msg+=`<span class="report-win">Player gains ${diff}.</span>`;
 }else if(t.c>t.p){
  cScore+=diff;
  msg+=`<span class="report-loss">${opponentWord()} gains ${diff}.</span>`;
 }else{
  msg+=`<span class="report-tie">Deadlock. No score.</span>`;
 }

 report(msg);
 finalized=true;
 render();

 if(pScore>=goal||cScore>=goal){
  pendingEnd=true;
  report(`<span class="report-info">Goal reached. Review the Outcome Report, then press Wrap.</span>`);
  render();
 }else{
  report(`<span class="report-info">Round complete. Press Next.</span>`);
  render();
 }
}

function endBattle(){
 const hasBloodline=royalRanks.some(r=>!pRoyals[r]);

 if(pScore>=goal&&hasBloodline){
  playSfx("win");
  if(mode==="campaign"&&campaignQueue.length){
   storyState="victory";
   showStory(currentOption==="classic"
    ? `${fname(playerF)} wins the match.\n\nMatch ${battleIndex} complete. Next computer awaits.`
    : `${playerF.name} survives the field with a royal bloodline intact.\n\nFresh from victory, the army turns toward the next banner. The campaign is not yet complete.`);
  }else if(mode==="campaign"){

   showStory(currentOption==="classic"
    ? `${fname(playerF)} wins the Trifecta.\n\nThree computer suits defeated with one royal reserve.`
    : `${playerF.name} defeats every computer and stands above the four suits.\n\nThere is no shared crown. There is only conquest.`);
  }else{
   storyState="victory";
   showStory(currentOption==="classic"
    ? `${fname(playerF)} wins the match.\n\nYou reached ${goal} points and kept the Heir protected.`
    : `${playerF.name} claims the field with bloodline intact.\n\nThe enemy retreats, but the greater war still waits beyond the border.`);
  }
 }else{
  playSfx("loss");
  storyState="defeat";
  showStory(currentOption==="classic" ? `${fname(cpuF)} wins the match.\n\nThe Computer reached the point goal first.` : `${cpuF.name} breaks your line before your conquest can be claimed.`);
 }
}

function houseRulesText(){
 return `FOURSUIT! HOUSE RULES FOR TABLE PLAY
Beta 0.1

A face-to-face standard-deck adaptation of the browser game.

These house rules preserve the spirit of Foursuit: 3x3 fields, score-difference rounds, royal powers, the Royal Parlay, and the final Heir/Bloodline reserve. Table play changes the timing of the Royal Parlay so two human players can play cleanly without the browser's hidden Computer choice.

COMPONENTS
- One standard 52-card deck.
- Paper, counters, or coins for score.
- Each player uses one suit's 2 through 10 as field cards.
- Each player uses that same suit's Jack, Queen, King, and Ace as royals.

OBJECTIVE
Win rounds and reach the chosen point goal first while keeping one final unused royal in reserve.

The final unused royal is the Heir in Classic play or the Bloodline in Fantasy play. It may never be committed.

SUGGESTED POINT GOALS
50 = quick game
100 = short game
150 = full game
200+ = long game

SETUP
1. Each player chooses a suit.
2. Each player takes that suit's 2 through 10 and secretly arranges them face down in a 3x3 field.
3. Each player keeps Jack, Queen, King, and Ace nearby as royal cards.
4. Reveal both 3x3 fields at the same time.

FIELD RESOLUTION
Compare each square directly.
- Higher number wins that square.
- Lower number falls.
- Equal numbers tie.
Only surviving winning cards count toward the round total. Tied squares do not count unless changed by a royal.

HOUSE ROYAL PARLAY
After fields are revealed, each player may secretly choose one royal from their hand or pass.

Do not place the royal on a target yet.

Reveal chosen royals at the same time.

ROYAL HIERARCHY
Jack < Queen < King < Ace

- Matching royals draw. No power resolves. Both royals return unused.
- If the royals do not match, the higher royal wins.
- The lower royal is blocked and returns unused.
- The winning royal then chooses a valid target, resolves its power, and is spent.
- If one player passes and the other commits a royal, the committed royal resolves and is spent.
- A player may never commit their final unused royal.

ROYAL POWERS
Jack: claims one tied square.
Queen: restores one of your fallen cards.
King: cancels one opposing survivor.
Ace: swaps two adjacent opposing cards. No diagonal swaps.

FANTASY ROYAL ROLES
Jack — Bandit: claims a tied field.
Queen — Healer: restores the fallen.
King — Knight: breaks an enemy survivor.
Ace — Wizard: bends the field by swapping adjacent enemy cards.

SCORING
After the Royal Parlay resolves, total each player's surviving cards.
The higher total scores the difference.

Example:
Player A totals 31.
Player B totals 24.
Player A scores 7.

If totals are equal, the round is a Deadlock and no one scores.

NEXT ROUND
Collect only the 2 through 10 field cards and arrange a new 3x3 field.
Spent royals remain spent.
Drawn or blocked royals remain available.
The final Heir/Bloodline remains locked.

MODES FOR TABLE PLAY
Single / Battle:
One suit against one opposing suit.

Trifecta / Campaign:
Win three matches in a row using one royal reserve.

Colors / Allies:
Each player controls both suits of one color. Resolve both fields, combine totals, then score once.

NOTE
The browser version is the official digital engine. These house rules are a face-to-face adaptation for real cards.`;
}

}

  </div>

  <h3>Royal Parlay</h3>
  <p>Each side may commit one royal. Compare ranks: <b>Jack &lt; Queen &lt; King &lt; Ace</b>. Matching royals draw and remain unused. Otherwise, the higher royal wins, resolves, and is spent. The lower royal is blocked and remains unused.</p>

  <h3>Royals</h3>
  <ol>
    <li><b>Jack:</b> claims one tied square.</li>
    <li><b>Queen:</b> restores one fallen card.</li>
    <li><b>King:</b> cancels one opposing survivor.</li>
    <li><b>Ace:</b> swaps two adjacent opposing cards. No diagonal swaps.</li>
  </ol>

  <h3>Difficulty</h3>
  <p><b>Easy</b> gives the Computer more chances to overlook a royal play. <b>Medium</b> sits between the two extremes. <b>Hard</b> makes the Computer sharper and less likely to pass on strong royal opportunities.</p>

  <div class="scale-list">

 ` : `

    <li>Call one royal champion into the <b>Royal Parlay</b>, or pass.</li>
    <li>Press Lock. Matching champions clash and withdraw; the higher champion acts.</li>
    <li>The higher surviving force scores the difference.</li>
  </ol>

  <div class="mini-grid">
    <div class="mini-card"><b>Battle</b><br>Fight one enemy faction.</div>

    <div class="mini-card"><b>Allies</b><br>Fight as both suits of one color. Resolve both armies, then score once.</div>

  </div>

  <h3>Royal Champions</h3>
  <div class="mini-grid">

  <div class="modal-actions"><button class="btn" onclick="downloadHouseRules()">Download House Rules</button><button class="btn" onclick="forceCloseRules()">Close</button></div>

 $("rulesContent").innerHTML = rules;
 $("rulesModal").classList.add("active");
